<!DOCTYPE html> 
<html lang="zh-CN"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>用户注册页面</title> 
    <link rel="stylesheet" href="register.css"> 
</head> 
<body> 
    <div class="register-container"> 
        <h1>用户注册</h1> 
        <form id="registerForm" action="./registerProcess.php" method="post"> 
            <div class="form-group">                
                <label for="username">用户名：</label>                
                <input type="text" id="username" name="username" required placeholder="请输入您的用户名">            
            </div>            
            <div class="form-group">      
                <label for="password">密码：</label>                
                <input type="password" id="password" name="password" required placeholder="请输入密码">            
            </div>            
            <div class="form-group">                
                <label>性别：</label>                
                <div class="radio-group" required>        
                    <input type="radio" id="male" name="gender" value="male">                    
                    <label for="male">男</label>                    
                    <input type="radio" id="female" name="gender" value="female">                    
                    <label for="female">女</label>                
                </div>  
            </div>            
            <div class="form-group">                
                <label for="age">年龄：</label>                
                <input type="number" id="age" name="age" min="1" max="120" required placeholder="请输入您的年龄">            
            </div>            
            <div class="form-group">            
                <label for="birthday">出生年月：</label>                
                <input type="month" id="birthday" name="birthday" required>            
            </div>            
            <div class="form-group">                
                <label for="email">邮箱地址：</label>                
                <input type="email" id="email" name="email" required placeholder="请输入您的邮箱">            
            </div>            
            <div class="form-group">                
                <label for="address">家庭住址：</label>                
                <textarea id="address" name="address" rows="3" required placeholder="请输入您的详细住址"></textarea>            
            </div>            
            <div class="form-group">                
                <label>兴趣爱好：</label>        
                <div class="checkbox-group">                    
                    <input type="checkbox" id="hobby1" name="hobby[]" value="阅读">                    
                    <label for="hobby1">阅读</label>                    
                    <input type="checkbox" id="hobby2" name="hobby[]" value="运动">                    
                    <label for="hobby2">运动</label> 
                    <input type="checkbox" id="hobby3" name="hobby[]" value="音乐">                    
                    <label for="hobby3">音乐</label>                    
                    <input type="checkbox" id="hobby4" name="hobby[]" value="旅行">                    
                    <label for="hobby4">旅行</label>           
                    <input type="checkbox" id="hobby5" name="hobby[]" value="编程">                    
                    <label for="hobby5">编程</label>                
                </div>            
            </div>             
            <div class="form-group submit-group">                
                <button type="submit">提交注册</button>      
                <button type="reset">重置表单</button>            
            </div>
        </form> 
    </div>
</body> 
</html>
